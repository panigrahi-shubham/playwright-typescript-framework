name: Playwright Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/playwright-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/playwright-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright/**'
  workflow_dispatch:

concurrency:
  group: playwright-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Framework
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm run lint:ci

  smoke:
    name: Run Smoke Suite
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm ci
        working-directory: playwright
      - run: npx playwright install --with-deps
        working-directory: playwright
      - name: Run smoke suite
        run: npm run smoke
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          RUN_AUTH_TESTS: ${{ secrets.RUN_AUTH_TESTS }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  regression:
    name: Run Full Suite
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm ci
        working-directory: playwright
      - run: npx playwright install --with-deps
        working-directory: playwright
      - name: Run full regression suite
        run: npm test
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          RUN_AUTH_TESTS: ${{ secrets.RUN_AUTH_TESTS }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: playwright/test-results/
          if-no-files-found: ignore
          retention-days: 14
