name: Playwright CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/playwright-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/playwright-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright/**"
  workflow_dispatch:

concurrency:
  group: playwright-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint
  # Runs ESLint on all TypeScript source files before any tests execute.
  # Fails fast — no point running 30-min test suite against broken code.
  # ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint Framework
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint:ci

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2: E2E Tests
  # Runs the full Playwright suite across all configured browsers.
  # Secrets from GitHub → Settings → Secrets and variables → Actions are
  # injected as environment variables at runtime (never logged or stored).
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: 🎭 Run Playwright E2E
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright project dependencies
        run: npm ci
        working-directory: playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: playwright

      - name: Run E2E suite
        run: npm run test:ci
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          RUN_AUTH_TESTS: ${{ secrets.RUN_AUTH_TESTS }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Generate Allure HTML report
        if: ${{ always() && !cancelled() }}
        run: npx allure generate allure-results --clean -o allure-report
        working-directory: playwright

      - name: Write job summary
        if: ${{ always() && !cancelled() }}
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth tests | ${{ secrets.RUN_AUTH_TESTS || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📄 Download the **playwright-report** artifact below to view detailed results." >> $GITHUB_STEP_SUMMARY
          echo "> 📊 Download the **allure-report** artifact for a rich visual report." >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright HTML report
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Allure HTML report
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwright/allure-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload raw Allure results
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: playwright/allure-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test failure traces
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: playwright/test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: ${{ success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright/playwright-report/

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy Report to GitHub Pages
  # Only runs on a successful push to main/master.
  # Publishes the Playwright HTML report so it's accessible as a live URL.
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-report:
    name: 🚀 Deploy Playwright Report
    needs: test
    if: ${{ needs.test.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
