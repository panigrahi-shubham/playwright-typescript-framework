name: Playwright Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/playwright-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/playwright-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright/**'
  workflow_dispatch:

concurrency:
  group: playwright-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Framework
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm run lint:ci

  smoke:
    name: Run Smoke Suite
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm ci
        working-directory: playwright
      - run: npx playwright install --with-deps
        working-directory: playwright
      - name: Health check upstream site
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL:-https://www.automationexercise.com}"
          echo "Checking site health: $url"
          # Failures here are usually external (Cloudflare 525 / 5xx). Skip suite to keep CI signal meaningful.
          http_code="$(curl -sS -L -o /tmp/site.html -w '%{http_code}' "$url" || true)"
          if [[ "$http_code" -ge 500 ]] || grep -qE 'Error code 525|SSL handshake failed' /tmp/site.html; then
            echo "::warning::Upstream site appears unavailable (HTTP=$http_code). Skipping smoke suite."
            exit 0
          fi
      - name: Run smoke suite
        run: npm run smoke
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  regression:
    name: Run Full Suite
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm ci
        working-directory: playwright
      - run: npx playwright install --with-deps
        working-directory: playwright
      - name: Health check upstream site
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL:-https://www.automationexercise.com}"
          echo "Checking site health: $url"
          http_code="$(curl -sS -L -o /tmp/site.html -w '%{http_code}' "$url" || true)"
          if [[ "$http_code" -ge 500 ]] || grep -qE 'Error code 525|SSL handshake failed' /tmp/site.html; then
            echo "::warning::Upstream site appears unavailable (HTTP=$http_code). Skipping regression suite."
            exit 0
          fi
      - name: Run full regression suite
        run: npm test
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: playwright/test-results/
          if-no-files-found: ignore
          retention-days: 14

  auth:
    name: Run Authenticated Coverage
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.TEST_EMAIL != '' && secrets.TEST_PASSWORD != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - run: npm ci
      - run: npm ci
        working-directory: playwright
      - run: npx playwright install --with-deps
        working-directory: playwright
      - name: Health check upstream site
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL:-https://www.automationexercise.com}"
          echo "Checking site health: $url"
          http_code="$(curl -sS -L -o /tmp/site.html -w '%{http_code}' "$url" || true)"
          if [[ "$http_code" -ge 500 ]] || grep -qE 'Error code 525|SSL handshake failed' /tmp/site.html; then
            echo "::warning::Upstream site appears unavailable (HTTP=$http_code). Skipping authenticated suite."
            exit 0
          fi
      - name: Run authenticated suite
        run: npm run auth
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          RUN_AUTH_TESTS: 'true'
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
